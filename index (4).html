function svgNodeToJpeg(containerEl, scale = 2, bg = "#F3EEE1", title = null) {
  return new Promise((resolve, reject) => {
    try {
      const svg = containerEl && containerEl.querySelector("svg");
      if (!svg) return reject(new Error("グラフが見つかりません"));
      const w = parseInt(svg.getAttribute("width")) || svg.clientWidth || 600;
      const h = parseInt(svg.getAttribute("height")) || svg.clientHeight || 300;
      const titleH = title ? 34 : 0;
      const svgString = (() => {
        const clone = svg.cloneNode(true);
        clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
        clone.setAttribute("width", w);
        clone.setAttribute("height", h);
        return new XMLSerializer().serializeToString(clone);
      })();
      const svgUrl = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgString);
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = w * scale;
        canvas.height = (h + titleH) * scale;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.scale(scale, scale);
        if (title) {
          ctx.fillStyle = "#1B2430";
          ctx.font = "bold 18px 'Zen Kaku Gothic New', 'Hiragino Sans', sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(title, w / 2, titleH / 2 + 4);
        }
        ctx.drawImage(img, 0, titleH, w, h);
        resolve(canvas.toDataURL("image/jpeg", 0.92));
      };
      img.onerror = () => reject(new Error("画像化に失敗しました"));

    } catch (e) {

    }
  });
}
